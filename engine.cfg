# data source
symbol=btcusdt
use_testnet=0
use_binance_us=0
poll_timeout_ms=100
reconnect_delay=5

# session lifecycle
wind_down_minutes=5

# warmup phase
warmup_ticks=64

# portfolio-level (controls buy gate regression adjustments)
poll_interval=100
r2_threshold=0.30
slope_scale_buy=0.50
max_shift=5.00

# paper trading
starting_balance=10000.00

# per-position exit conditions (percentage-based)
take_profit_pct=3.00
stop_loss_pct=1.50

# market microstructure filters (initial values - adapted by P&L regression)
volume_multiplier=3.00
entry_offset_pct=0.15
spacing_multiplier=2.00

# adaptive filter clamps (how far filters can drift from initial)
offset_min=0.05
offset_max=0.50
vol_mult_min=1.50
vol_mult_max=6.00
filter_scale=0.50

# TUI
tui_enabled=1
tui_render_interval=10
